{% extends "layout.html" %}


{% block css_adicional %}
<link rel="stylesheet" href="static/src/css/produto.css">
{% endblock %}

{% block conteudo %}
<div class="container">
  
  <div class="image-section">
    <img src="{{produto.url_imagem}}" alt="Hambúrguer">
  </div>

  <div class="details">
    <div class="title">{{produto.produto}}</div>

    <div class="description">
      {{produto.descricao}}
    </div>

    <div class="price-old">{{produto.preco}}</div>
    <div class="price">{{produto.preco}}</div>

    <a href="#" class="button">Comprar Agora</a>

    <!-- Simulação de falta de estoque -->
    <div class="out">Produto indisponível no momento</div>
  </div>

</div>
{% endblock %}
