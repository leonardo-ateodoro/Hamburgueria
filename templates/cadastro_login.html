{% extends "layout.html" %}

{% block css_adicional %}
<link rel="stylesheet" href="{{ url_for('static', filename = 'src/css/cadastro_login.css')}}">
    {% endblock %}

{% block conteudo %}

    <div class="container">
        <span class="logo">🍔 Burger Master</span>
        
        <div id="login-form">
            <h2>Bem-vindo de volta!</h2>
            <form>
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" placeholder="Seu nome de usuário" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" placeholder="Sua senha" required>
                </div>
                <button type="submit">ENTRAR</button>
        </form action="/cadastrar_usuario" method="post" id="register-form" class="hidden"> 
            <div class="toggle-link">
                Ainda não tem conta? <a href="#" onclick="toggleForm()">Cadastre-se</a>
            </div>
        </div>

        <div id="register-form" class="hidden">
            <h2>Criar Conta</h2>
            <form>
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" placeholder="Ex: João Silva" required>
                </div>
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" placeholder="Escolha um usuário" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" placeholder="Crie uma senha forte" required>
                </div>
                <button type="submit">CADASTRAR</button>
            </form>
            <div class="toggle-link">
                Já possui conta? <a href="#" onclick="toggleForm()">Faça Login</a>
            </div>
        </div>
    </div>
    <script>
        function toggleForm() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            
            loginForm.classList.toggle('hidden');
            registerForm.classList.toggle('hidden');
        }
    </script>
{% endblock %}
